[package]
name = "stealth_spike"
type = "contract"
authors = ["Trulib Ltd"]
compiler_version = ">=1.0.0"

# THROWAWAY Phase-0 feasibility spike for stealth payments (see
# docs/stealth-token-scope.md). Proves the one operation the standard token
# can't express: spend a POINT-owned note by proving knowledge of its one-time
# scalar (p·G == owner point) + nullify it. Nightly tag must match the toolchain.
[dependencies]
aztec = { git = "https://github.com/AztecProtocol/aztec-packages", tag = "v5.0.0-nightly.20260701", directory = "noir-projects/aztec-nr/aztec" }
