[package]
name = "faucet"
type = "contract"
authors = ["Trulib Ltd"]
compiler_version = ">=0.34.0"

# Same v5 tag + aztec source as azns/ (the token dep pulls aztec from
# aztec-packages, so aztec MUST come from there too or Nargo sees two distinct
# aztec crates - see azns/Nargo.toml).
[dependencies]
aztec = { git = "https://github.com/AztecProtocol/aztec-packages/", tag = "v5.0.0-nightly.20260701", directory = "noir-projects/aztec-nr/aztec" }
token = { git = "https://github.com/AztecProtocol/aztec-packages/", tag = "v5.0.0-nightly.20260701", directory = "noir-projects/noir-contracts/contracts/app/token_contract" }
